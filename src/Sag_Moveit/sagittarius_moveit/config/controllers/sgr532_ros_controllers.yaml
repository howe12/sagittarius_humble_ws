/$(var robot_name):
  controller_manager:
    ros__parameters:
      update_rate: 10 # Hz
      arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController
      gripper_controller:
        type: joint_trajectory_controller/JointTrajectoryController
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
  arm_controller:
    ros__parameters:
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - joint6
      command_interfaces:
        - position
      state_interfaces:
        - position
      state_publish_rate: 50.0 # Hz
      action_monitor_rate: 20.0 # Hz
      constraints:
        stopped_velocity_tolerance: 0.02
        goal_time: 1.0
  gripper_controller:
    ros__parameters:
      joints:
        - joint_gripper_left
      command_interfaces:
        - position
      state_interfaces:
        - position
  joint_state_broadcaster:
    ros__parameters:
      joints:
        - joint1
        - joint2
        - joint3
        - joint4
        - joint5
        - joint6
        - joint_gripper_left
        - joint_gripper_right
